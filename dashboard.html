<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <button onclick="toggleDarkMode()" id="darkBtn">
🌙 Dark Mode
</button>
<button onclick="logout()">Logout</button>
    <h1>Employee Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h2 id="totalEmployees">0</h2>
            <p>Total Employees</p>
        </div>

        <div class="card">
          <h2 id="totalDepartments">0</h2>
            <p>Departments</p>
        </div>

        <div class="card">
            <h2 id="activeStaff">0</h2>
            <p>Active Staff</p>
        </div>
        <div class="chart-container">

    <h2>System Analytics</h2>

    <div class="bar employees-bar">
        Employees
    </div>

</div>

    </div>

    <input type="text"
id="search"
placeholder="Search Employee"
onkeyup="searchEmployee()">

    <div class="form-box">

        <input type="text" id="empName" placeholder="Employee Name">

        <input type="text" id="empDept" placeholder="Department">

        <button onclick="addEmployee()">Add Employee</button>

    </div>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="employeeList">

        </tbody>

    </table>

</div>

<script src="app.js"></script>

</body>
</html>
