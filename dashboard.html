<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
<div class="dashboard-container">

    <!-- HEADER -->
    <header class="header">

        <div>
            <h1>⚡ Nexus One Dashboard</h1>
            <p>Employee Management System</p>
        </div>

        <div class="header-actions">

            <span id="statusBadge">🟢 System Active</span>

            <button onclick="toggleDarkMode()">🌙</button>
            <button onclick="changePassword()">🔑</button>
            <button onclick="logout()">🚪</button>

        </div>

    </header>

    <!-- STATS -->
    <div class="stats">

        <div class="stat-card">
            <h2 id="totalEmployees">0</h2>
            <p>Employees</p>
        </div>

        <div class="stat-card">
            <h2 id="totalDepartments">0</h2>
            <p>Departments</p>
        </div>

        <div class="stat-card">
            <h2 id="activeStaff">0</h2>
            <p>Active Staff</p>
        </div>

    </div>

    <!-- SEARCH -->
    <input type="text" id="search"
    placeholder="🔍 Search employee..."
    onkeyup="searchEmployee()">

    <!-- FORM -->
    <div class="form-box">

        <input type="text" id="empName" placeholder="Employee Name">
        <input type="text" id="empDept" placeholder="Department">

        <button onclick="addEmployee()">+ Add Employee</button>

    </div>

    <!-- TABLE -->
    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="employeeList"></tbody>

    </table>

</div>
<script src="app.js"></script>
</body>
</html>
